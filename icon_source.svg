<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep indigo → violet -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B2FD4"/>
      <stop offset="100%" stop-color="#8B3FD8"/>
    </linearGradient>
    <!-- Clipboard body highlight -->
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <!-- History arc gradient -->
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Full-bleed background – iOS applies squircle mask itself -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle inner glow at top -->
  <ellipse cx="512" cy="200" rx="380" ry="160" fill="#FFFFFF" opacity="0.07"/>

  <!-- Clipboard body -->
  <rect x="258" y="310" width="508" height="580" rx="52" ry="52"
        fill="url(#board)" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="2.5"
        filter="url(#shadow)"/>

  <!-- Clipboard clip (top) -->
  <rect x="390" y="270" width="244" height="96" rx="48" ry="48"
        fill="#FFFFFF" opacity="0.18"/>
  <rect x="430" y="282" width="164" height="72" rx="36" ry="36"
        fill="#1A1060" opacity="0.45"/>

  <!-- Content lines on clipboard -->
  <rect x="316" y="446" width="280" height="22" rx="11" fill="#FFFFFF" opacity="0.55"/>
  <rect x="316" y="494" width="392" height="22" rx="11" fill="#FFFFFF" opacity="0.40"/>
  <rect x="316" y="542" width="340" height="22" rx="11" fill="#FFFFFF" opacity="0.40"/>

  <!-- History clock badge (bottom-right) -->
  <!-- Badge circle background -->
  <circle cx="686" cy="718" r="112" fill="#1A1060" opacity="0.65"/>
  <circle cx="686" cy="718" r="112" fill="none" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="2.5"/>

  <!-- Clock face -->
  <circle cx="686" cy="718" r="80" fill="none" stroke="url(#arc)" stroke-width="13" stroke-linecap="round"
          stroke-dasharray="440" stroke-dashoffset="110"/>
  <!-- Clock hands -->
  <line x1="686" y1="718" x2="686" y2="658" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round"/>
  <line x1="686" y1="718" x2="726" y2="748" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="686" cy="718" r="9" fill="#FFFFFF"/>

  <!-- History arrow (counter-clockwise tip) -->
  <path d="M618 660 L638 638 L644 668" fill="#FFFFFF" opacity="0.85"/>
</svg>
